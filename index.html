<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My E-Commerce Store</h1>
    <a href="login.html">
        <button>Login</button>
    </a>
</header>

<section class="products">

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Smart Phone</h3>
        <p>₹15000</p>
        <button onclick="addToCart('Smart Phone',15000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Laptop</h3>
        <p>₹50000</p>
        <button onclick="addToCart('Laptop',50000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Headphone</h3>
        <p>₹2000</p>
        <button onclick="addToCart('Headphone',2000)">
            Add to Cart
        </button>
    </div>

</section>

<section class="cart">

    <h2>Shopping Cart</h2>

    <ul id="cartItems"></ul>

    <h3>
        Total: ₹
        <span id="totalPrice">0</span>
    </h3>

    <button onclick="checkout()">
        Checkout
    </button>

</section>

<script src="script.js"></script>

</body>
</html>
