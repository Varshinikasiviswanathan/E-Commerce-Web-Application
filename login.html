<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f4f4;
            font-family:Arial;
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            width:300px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#007BFF;
            color:white;
            border:none;
        }

    </style>
</head>
<body>

<div class="login-box">

    <h2>Login</h2>

    <input
    type="text"
    placeholder="Username">

    <input
    type="password"
    placeholder="Password">

    <button onclick="login()">
        Login
    </button>

</div>

<script>

function login(){

    alert(
    "Login Successful!"
    );

    window.location.href =
    "index.html";
}

</script>

</body>
</html>
